  <h1>Fetch script</h1>

  <script>

    async function postData(url = '', data = {}) {
      const response = await fetch(url, {
        method: 'POST',
        mode: 'cors',
        cache: 'no-cache',
        headers: {
          'Content-Type': 'application/json'
        },
        referrerPolicy: 'strict-origin',
        body: JSON.stringify(data),
      });
      return response;
    }

    main();
  </script>
